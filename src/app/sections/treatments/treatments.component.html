<section id="treatments" class="section treatments" aria-labelledby="treatments-title">
  <div class="container">
    <div class="section-heading" appReveal>
      <span class="section-eyebrow">{{ i18n.t('treatments.eyebrow') }}</span>
      <h2 id="treatments-title">{{ i18n.t('treatments.title') }}</h2>
      <p>{{ i18n.t('treatments.subtitle') }}</p>
    </div>

    <div class="filters" role="tablist" aria-label="Treatment categories">
      <button *ngFor="let c of categories()"
              role="tab"
              [attr.aria-selected]="active() === c.raw"
              [class.is-active]="active() === c.raw"
              (click)="setActive(c.raw)">
        {{ c.label }}
      </button>
    </div>

    <div class="grid">
      <article class="card" *ngFor="let t of visible(); trackBy: trackByName">
        <span class="icon"><app-icon [name]="t.icon"></app-icon></span>
        <div class="card-body">
          <h3>{{ t.translatedName }}</h3>
          <small>{{ t.translatedCategory }}</small>
        </div>
      </article>
    </div>
  </div>
</section>
